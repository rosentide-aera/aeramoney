<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aera — Personal Finance</title>
  <meta name="description" content="Aera is a personal finance management app that keeps your financial data private, on your device, and under your control." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:  #1C3A0F;
      --green-brand: #2D5016;
      --green-mid:   #4A7C2F;
      --green-tint:  #F2F8EE;
      --bg:          #FAFDF8;
      --white:       #FFFFFF;
      --text:        #1A1A1A;
      --text-muted:  #5A6472;
      --border:      #DDE8D5;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* NAV */
    nav {
      background: var(--green-dark);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
    }
    .wordmark {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -0.02em;
      text-decoration: none;
    }

    /* HERO */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 2rem;
      background: linear-gradient(160deg, var(--green-dark) 0%, var(--green-brand) 100%);
      color: var(--white);
    }
    .hero-logo {
      font-size: 4rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 1.25rem;
    }
    .hero-tagline {
      font-size: 1.25rem;
      font-weight: 400;
      opacity: 0.85;
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 999px;
      padding: 0.5rem 1.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    /* FOOTER */
    footer {
      background: var(--green-dark);
      color: rgba(255,255,255,0.7);
      padding: 1.25rem 2rem;
      text-align: center;
      font-size: 0.8125rem;
    }
    footer a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      margin: 0 0.625rem;
    }
    footer a:hover { text-decoration: underline; }
    .footer-links { margin-bottom: 0.5rem; }
    .footer-copy { opacity: 0.55; font-size: 0.75rem; }
  </style>
</head>
<body>

  <nav>
    <a class="wordmark" href="/">Aera</a>
  </nav>

  <section class="hero">
    <div class="hero-logo">Aera</div>
    <p class="hero-tagline">
      Your complete picture of money — private, local, and always yours.
    </p>
    <span class="badge">Coming soon to Google Play</span>
  </section>

  <footer>
    <div class="footer-links">
      <a href="/privacy/">Privacy Policy</a>·
      <a href="/terms/">Terms of Service</a>·
      <a href="/delete/">Data Deletion</a>·
      <a href="mailto:support@aeramoney.com">Contact</a>
    </div>
    <div class="footer-copy">&copy; 2026 Rosentide Inc. All rights reserved.</div>
  </footer>

</body>
</html>
